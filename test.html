<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Diagnóstico: colar do Milanote</title>
<style>
  body{font-family:-apple-system,Segoe UI,Arial,sans-serif;max-width:700px;margin:40px auto;padding:0 20px;color:#222}
  h3{margin-bottom:4px}
  textarea{width:100%;box-sizing:border-box;font-family:monospace;font-size:13px;padding:8px;border:1px solid #ccc;border-radius:6px}
  #in{height:90px}
  #out{height:260px;background:#f7f7f7}
  .step{background:#eef6ff;border-left:4px solid #38b6ff;padding:10px 14px;margin:14px 0;border-radius:4px}
  button{margin-top:8px;padding:8px 16px;border:0;border-radius:6px;background:#38b6ff;color:#fff;font-size:14px;cursor:pointer}
</style>
</head>
<body>
  <h3>🔍 Diagnóstico: colar do Milanote</h3>
  <p>Isso é só uma página de teste, não mexe no board de verdade.</p>

  <div class="step">1. No Milanote, selecione um trecho com <b>negrito</b> e/ou <i>itálico</i> e copie (Ctrl+C).</div>
  <textarea id="in" placeholder="Clique aqui dentro e cole com Ctrl+V"></textarea>

  <div class="step">2. O código que o Milanote realmente mandou apareceu aqui embaixo:</div>
  <textarea id="out" readonly placeholder="(vai aparecer aqui depois do Ctrl+V acima)"></textarea>
  <br>
  <button onclick="copyOut()">📋 Copiar tudo</button>
  <span id="msg" style="margin-left:10px;color:#2a8"></span>

  <p style="margin-top:24px;color:#666">3. Cole o conteúdo copiado de volta na nossa conversa.</p>

<script>
document.getElementById('in').addEventListener('paste', function(e){
  var cd = e.clipboardData || window.clipboardData;
  var html = cd && cd.getData ? cd.getData('text/html') : '';
  var txt = cd && cd.getData ? cd.getData('text/plain') : '';
  var out = document.getElementById('out');
  out.value = html && html.trim() ? html : '(SEM HTML no clipboard do Milanote — só veio texto puro)\n\n--- texto puro ---\n' + txt;
});
function copyOut(){
  var out = document.getElementById('out');
  out.select();
  document.execCommand('copy');
  var m = document.getElementById('msg');
  m.textContent = 'Copiado!';
  setTimeout(function(){ m.textContent=''; }, 2000);
}
</script>
</body>
</html>
