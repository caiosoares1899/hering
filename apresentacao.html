<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cronômetro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}

body {
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 16px;
}

#timer {
  font-family: 'Segoe UI', system-ui, sans-serif;
  font-size: 52px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.03em;
  color: #fff;
  background: rgba(0,0,0,0.6);
  padding: 12px 24px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: color 0.4s, border-color 0.4s;
  user-select: none;
  cursor: default;
  -webkit-app-region: drag;
}

#timer.warning {
  color: #EF9F27;
  border-color: rgba(239,159,39,0.35);
}

#timer.danger {
  color: #E24B4A;
  border-color: rgba(226,75,74,0.35);
}

#timer.done {
  color: #E24B4A;
  border-color: rgba(226,75,74,0.5);
  animation: pulse 0.8s infinite alternate;
}

@keyframes pulse {
  from { opacity: 1; }
  to { opacity: 0.3; }
}
</style>
</head>
<body>

<div id="timer">6:00</div>

<script>
let lastRemaining = -1;

function readState() {
  try {
    const raw = localStorage.getItem('cd_timer');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function applyState(s) {
  if (!s) return;
  if (s.remaining === lastRemaining) return;

  const m = Math.floor(s.remaining / 60);
  const sec = s.remaining % 60;
  document.getElementById('timer').textContent = m + ':' + String(sec).padStart(2, '0');
  lastRemaining = s.remaining;

  const t = document.getElementById('timer');
  t.className = '';
  if (s.remaining <= 0) t.className = 'done';
  else if (s.remaining <= 60) t.className = 'danger';
  else if (s.remaining <= 120) t.className = 'warning';
}

applyState(readState());

window.addEventListener('storage', function(e) {
  if (e.key === 'cd_timer') applyState(readState());
});

setInterval(function() {
  applyState(readState());
}, 500);
</script>
</body>
</html>
